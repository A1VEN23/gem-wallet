<!doctype html>
  <html lang="ru">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
      <meta name="theme-color" content="#000000" />
      <title>Gem Wallet</title>

      <!-- 1. Hard black background before anything else paints -->
      <style>
        html, body, #root {
          margin: 0; padding: 0;
          background: #000 !important;
          color: #fff;
          overscroll-behavior: none;
          min-height: 100vh;
        }
      </style>

      <!-- 2. Telegram SDK — loads sync so initDataUnsafe is ready at first render -->
      <script src="https://telegram.org/js/telegram-web-app.js"></script>

      <!-- 3. Kill Telegram's grey header/bg the moment SDK is available -->
      <script>
        (function () {
          try {
            var tg = window.Telegram && window.Telegram.WebApp;
            if (tg) {
              if (tg.setBackgroundColor) tg.setBackgroundColor('#000000');
              if (tg.setHeaderColor)     tg.setHeaderColor('#000000');
            }
          } catch (e) {}
          // Also force the body black via JS in case CSS hasn't applied yet
          document.documentElement.style.background = '#000';
          document.body && (document.body.style.background = '#000');
        })();
      </script>
    </head>
    <body>
      <div id="root" style="background:#000;min-height:100vh;"></div>
      <script type="module" src="/src/main.jsx?v=4"></script>
    </body>
  </html>
